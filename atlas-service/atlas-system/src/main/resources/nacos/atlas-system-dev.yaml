server:
  port: ${SERVER_PORT:8085}
  servlet:
    context-path: /atlas-system

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:mBYFyN4wXi6WsA}
      database: 0
      timeout: 10s
      client-type: lettuce
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/atlas?currentSchema=atlas_system&useUnicode=true&characterEncoding=utf-8
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:PK3uK7pUIwUTi1}

  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

logging:
  level:
    root: INFO
    com.atlas: DEBUG