spring:
  application:
    name: atlas-gateway
  config:
    import: optional:nacos:atlas-gateway-dev.yaml
  cloud:
    gateway:
      server:
        webflux:
          # Gateway 路由配置（使用新的配置键，也可以通过 Nacos Config 配置）
          routes:
            - id: auth-service-route
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - StripPrefix=0
            - id: system-service-route
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/users/**,/api/v1/roles/**,/api/v1/permissions/**
              filters:
                - StripPrefix=0
            - id: health-route
              uri: http://localhost:8080
              predicates:
                - Path=/health/**
              filters:
                - StripPrefix=1
            - id: mock-route
              uri: http://localhost:8080
              predicates:
                - Path=/mock/**
              filters:
                - StripPrefix=1
    # Nacos Config 配置
    nacos:
      config:
        server-addr: localhost:8848
        username: nacos
        password: nacos
        file-extension: yaml
        group: DEFAULT_GROUP
        namespace: dev
        data-id: ${spring.application.name}-${spring.profiles.active:dev}.yaml
        refresh-enabled: true
        shared-configs:
          - data-id: atlas-gateway-${spring.profiles.active:dev}.yaml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
        namespace: dev
        group: DEFAULT_GROUP

server:
  port: 8080


# Atlas Gateway 配置
atlas:
  gateway:
    routes:
      - id: health-route
        uri: http://localhost:8080
        predicates:
          - Path=/health/**
        filters:
          - StripPrefix=1
      - id: mock-route
        uri: http://localhost:8080
        predicates:
          - Path=/mock/**
        filters:
          - StripPrefix=1

# 日志配置
logging:
  level:
    root: INFO
    com.atlas.gateway: DEBUG
