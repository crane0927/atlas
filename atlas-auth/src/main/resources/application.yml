spring:
  application:
    name: atlas-auth
  config:
    import: optional:nacos:atlas-auth-dev.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: nacos
        password: nacos
        namespace: ${NACOS_NAMESPACE:dev}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: nacos
        password: nacos
        namespace: ${NACOS_NAMESPACE:dev}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        shared-configs:
          - data-id: atlas-common.yaml
            group: COMMON_GROUP
            refresh: true

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: mBYFyN4wXi6WsA
      database: 0
      timeout: 10s  # 注意单位现在用 s 表示秒
      client-type: lettuce
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms  # 等待时间，单位支持 ms、s 等

server:
  port: ${SERVER_PORT:8084}

# Atlas Auth 配置（从环境变量读取 JWT 密钥）
atlas:
  auth:
    jwt:
      private-key: ${ATLAS_AUTH_JWT_PRIVATE_KEY:}
      public-key: ${ATLAS_AUTH_JWT_PUBLIC_KEY:}
      key-id: ${ATLAS_AUTH_JWT_KEY_ID:atlas-key}
      expire: ${ATLAS_AUTH_JWT_EXPIRE:7200}
      algorithm: ${ATLAS_AUTH_JWT_ALGORITHM:RS256}

logging:
  level:
    root: INFO
    com.atlas: DEBUG

