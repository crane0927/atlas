server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /atlas-auth

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:mBYFyN4wXi6WsA}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      client-type: lettuce
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# 从环境变量读取 JWT 密钥，生产请勿在 Nacos 中明文填写
atlas:
  redis:
    service-prefix: auth
  auth:
    jwt:
      private-key: ${ATLAS_AUTH_JWT_PRIVATE_KEY:}
      public-key: ${ATLAS_AUTH_JWT_PUBLIC_KEY:}
      key-id: ${ATLAS_AUTH_JWT_KEY_ID:atlas-key}
      expire: ${ATLAS_AUTH_JWT_EXPIRE:7200}
      algorithm: ${ATLAS_AUTH_JWT_ALGORITHM:RS256}
    introspect:
      api-key: ${ATLAS_AUTH_INTROSPECT_API_KEY:}
    # 验证码：enabled=false 可关闭（如测试环境）
    captcha:
      enabled: ${ATLAS_AUTH_CAPTCHA_ENABLED:true}
      ttl-seconds: ${ATLAS_AUTH_CAPTCHA_TTL_SECONDS:120}
      length: ${ATLAS_AUTH_CAPTCHA_LENGTH:4}

logging:
  level:
    root: INFO
    com.atlas: DEBUG

